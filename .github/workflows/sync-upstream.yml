name: Sync with upstream

on:
  schedule:
    # Run on the 1st of every month at 9:00 UTC
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/github/spec-kit.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "Fork is $BEHIND commits behind upstream."
          fi

      - name: Create sync branch and merge
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m)"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit
          git push -u origin "$BRANCH"
          echo "SYNC_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Sync with upstream ($(date +%Y-%m))" \
            --body "Automated sync with [github/spec-kit](https://github.com/github/spec-kit).

          This PR brings in **${{ steps.check.outputs.behind }}** new commits from upstream.

          Please review the changes before merging." \
            --base master \
            --head "$SYNC_BRANCH"
